name: Data Pipeline - Process VBP Data

on:
  schedule:
    - cron: '0 6 15 1 *'  # 15 de Janeiro, 6h UTC (dados anuais DERAL)
  # Manual trigger - execute quando novos dados Excel forem adicionados
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Reprocessar todos os dados'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Process data
        run: |
          python scripts/preprocess_data.py

      - name: Check for changes
        id: changes
        run: |
          # Caminhos explicitos: git add -A arrastaria artefatos locais inesperados
          git add dashboard/public/data data
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update processed data [skip ci]"
          git push

      - name: Trigger deploy workflow
        # O [skip ci] (e o GITHUB_TOKEN) impedem o deploy automatico no push
        # do bot; o dispatch garante que o site acompanhe os dados novos.
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
